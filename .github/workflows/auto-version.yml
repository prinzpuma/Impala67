name: auto-version

on:
  push:
    branches: [main]

jobs:
  bump:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Patch-Version erhoehen
        id: bump
        run: |
          CURRENT=$(node -p "require('./src-tauri/tauri.conf.json').version")
          IFS='.' read -r MA MI PA <<< "$CURRENT"
          NEW="$MA.$MI.$((PA+1))"
          node -e "const fs=require('fs');const p='./src-tauri/tauri.conf.json';const j=JSON.parse(fs.readFileSync(p));j.version='$NEW';fs.writeFileSync(p, JSON.stringify(j, null, 2)+'\n');"
          node -e "const fs=require('fs');const p='./package.json';const j=JSON.parse(fs.readFileSync(p));j.version='$NEW';fs.writeFileSync(p, JSON.stringify(j, null, 2)+'\n');"
          echo "new=$NEW" >> $GITHUB_OUTPUT

      - name: Committen, taggen, pushen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src-tauri/tauri.conf.json package.json
          git commit -m "chore: bump version to ${{ steps.bump.outputs.new }} [skip ci]"
          git tag v${{ steps.bump.outputs.new }}
          git push origin main
          git push origin v${{ steps.bump.outputs.new }}