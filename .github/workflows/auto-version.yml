name: auto-version

on:
  push:
    branches:
      - main

permissions:
  contents: write
  actions: write

jobs:
  bump:
    if: "!contains(github.event.head_commit.message, 'chore: bump version')"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Patch-Version erhöhen
        run: |
          set -euo pipefail

          CURRENT=$(node -p "require('./src-tauri/tauri.conf.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          PATCH=$((PATCH + 1))
          NEW="$MAJOR.$MINOR.$PATCH"

          # Nach Force-Pushes können Tags weiter existieren, obwohl der
          # zugehörige Commit verschwunden ist. Daher freie Version suchen.
          while git ls-remote --exit-code --tags origin "refs/tags/v$NEW" >/dev/null 2>&1; do
            PATCH=$((PATCH + 1))
            NEW="$MAJOR.$MINOR.$PATCH"
          done

          export NEW
          echo "Bump $CURRENT -> $NEW"

          node <<'NODE'
          const fs = require("fs");
          const NEW = process.env.NEW;

          function writeJson(path, mutator) {
            const json = JSON.parse(fs.readFileSync(path, "utf8"));
            mutator(json);
            fs.writeFileSync(path, JSON.stringify(json, null, 2) + "\n");
          }

          writeJson("./src-tauri/tauri.conf.json", (json) => {
            json.version = NEW;
          });

          writeJson("./package.json", (json) => {
            json.version = NEW;
          });

          {
            const path = "./web/version.json";
            let json = { name: "Impala67" };

            if (fs.existsSync(path)) {
              json = JSON.parse(fs.readFileSync(path, "utf8"));
            }

            json.version = NEW;
            json.updated = new Date().toISOString().slice(0, 10);

            fs.writeFileSync(path, JSON.stringify(json, null, 2) + "\n");
          }

          {
            const path = "./web/updater.js";
            let source = fs.readFileSync(path, "utf8");

            if (!/const BUILD_VERSION = "[^"]+"/.test(source)) {
              console.error("BUILD_VERSION fehlt in web/updater.js");
              process.exit(1);
            }

            source = source.replace(
              /const BUILD_VERSION = "[^"]+"/,
              `const BUILD_VERSION = "${NEW}"`
            );

            fs.writeFileSync(path, source);
          }

          console.log(`Version ${NEW} vorbereitet`);
          NODE

          echo "NEW=$NEW" >> "$GITHUB_ENV"

      - name: Committen, taggen und pushen
        run: |
          set -euo pipefail

          git fetch --tags --force
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add \
            src-tauri/tauri.conf.json \
            package.json \
            web/version.json \
            web/updater.js

          git commit -m "chore: bump version to $NEW"
          git tag "v$NEW"

          git push origin main
          git push origin "v$NEW"

      - name: Windows-Release-Build auf dem neuen Tag starten
        uses: actions/github-script@v7
        with:
          script: |
            const tagRef = `v${process.env.NEW}`;
            
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: "release.yml",
              ref: tagRef
            });

            core.info(`release.yml wurde erfolgreich für den Tag ${tagRef} gestartet!`);