name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build-windows:
    name: Windows-Build und GitHub-Release
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Node-Abhängigkeiten installieren
        run: npm ci

      - name: config.local.js aus Secrets erzeugen
        shell: bash
        env:
          CLIENT_ID: ${{ secrets.GOOGLE_DESKTOP_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.GOOGLE_DESKTOP_CLIENT_SECRET }}
        run: |
          node <<'NODE'
          const fs = require("fs");

          fs.writeFileSync(
            "web/config.local.js",
            "window.APP_CONFIG = " +
              JSON.stringify({
                GOOGLE_DESKTOP_CLIENT_ID: process.env.CLIENT_ID,
                GOOGLE_DESKTOP_CLIENT_SECRET: process.env.CLIENT_SECRET
              }, null, 2) +
              ";\n"
          );
          NODE

      - name: Tauri bauen und Installer veröffentlichen
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Impala67 ${{ github.ref_name }}"
          releaseBody: Siehe die Assets unten für den Windows-Installer.
          releaseDraft: false
          prerelease: false
          uploadUpdaterJson: true

  deploy-pwa:
    name: PWA auf GitHub Pages veröffentlichen
    needs: build-windows
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - id: deployment
        uses: actions/deploy-pages@v4