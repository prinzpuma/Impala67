name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  version:
    name: Pruefen und Version bestimmen
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.next.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Konfliktmarker und Dateien pruefen
        run: |
          set -euo pipefail

          if grep -RIn --exclude-dir=.git --exclude-dir=node_modules -E '^(<<<<<<< |>>>>>>> )' .; then
            echo "::error::Ungeloeste Git-Konfliktmarker gefunden. Bitte lokal aufloesen und erneut pushen."
            exit 1
          fi

          node -e '
            const fs = require("fs");
            for (const f of ["src-tauri/tauri.conf.json", "package.json", "web/version.json"]) {
              JSON.parse(fs.readFileSync(f, "utf8"));
              console.log("Gueltiges JSON: " + f);
            }
          '

          node --check web/updater.js
          echo "web/updater.js ist gueltiges JavaScript"

      - name: Naechste freie Version bestimmen
        id: next
        run: |
          set -euo pipefail

          CURRENT=$(node -p "require('./src-tauri/tauri.conf.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          NEW="$MAJOR.$MINOR.$PATCH"

          # Solange der Tag schon existiert, Patch-Nummer erhoehen.
          while git ls-remote --exit-code --tags origin "refs/tags/v$NEW" >/dev/null 2>&1; do
            PATCH=$((PATCH + 1))
            NEW="$MAJOR.$MINOR.$PATCH"
          done

          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          echo "Version fuer dieses Release: $NEW"

  deploy-pwa:
    name: PWA auf GitHub Pages veroeffentlichen
    needs: version
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Version in PWA-Dateien setzen
        run: node .github/scripts/set-version.mjs "${{ needs.version.outputs.version }}"

      - name: PWA-Dateien pruefen
        run: node --check web/updater.js

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - id: deployment
        uses: actions/deploy-pages@v4

  build-windows:
    name: Windows-Build und GitHub-Release
    needs:
      - version
      - deploy-pwa
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Node-Abhaengigkeiten installieren
        run: npm ci

      - name: Version in Build-Dateien setzen
        shell: bash
        run: node .github/scripts/set-version.mjs "${{ needs.version.outputs.version }}"

      - name: config.local.js aus Secrets erzeugen
        shell: bash
        env:
          CLIENT_ID: ${{ secrets.GOOGLE_DESKTOP_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.GOOGLE_DESKTOP_CLIENT_SECRET }}
        run: |
          node -e '
            const fs = require("fs");
            fs.writeFileSync(
              "web/config.local.js",
              "window.APP_CONFIG = " +
                JSON.stringify({
                  GOOGLE_DESKTOP_CLIENT_ID: process.env.CLIENT_ID,
                  GOOGLE_DESKTOP_CLIENT_SECRET: process.env.CLIENT_SECRET
                }, null, 2) +
                ";\n"
            );
          '

      - name: Tauri bauen und Installer veroeffentlichen
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v${{ needs.version.outputs.version }}
          releaseName: "Impala67 v${{ needs.version.outputs.version }}"
          releaseBody: Siehe die Assets unten fuer den Windows-Installer.
          releaseDraft: false
          prerelease: false
          uploadUpdaterJson: true
