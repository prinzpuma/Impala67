name: release
on:
  push:
    tags: ["v*"]
jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - name: Linux-Abhängigkeiten installieren
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo find /etc/apt/sources.list.d -type f \( -name '*.list' -o -name '*.sources' \) -exec grep -l "packages.microsoft.com" {} \; | xargs -r sudo rm -f
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf build-essential curl wget file libxdo-dev libssl-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: config.local.js aus Secrets erzeugen
        shell: bash
        env:
          CLIENT_ID: ${{ secrets.GOOGLE_DESKTOP_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.GOOGLE_DESKTOP_CLIENT_SECRET }}
        run: |
          cat > web/config.local.js << EOF
          window.APP_CONFIG = {
            GOOGLE_DESKTOP_CLIENT_ID: "$CLIENT_ID",
            GOOGLE_DESKTOP_CLIENT_SECRET: "$CLIENT_SECRET"
          };
          EOF
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: __VERSION__
          releaseName: "Impala67 v__VERSION__"
          releaseDraft: false
          includeUpdaterJson: true
