<script>
// Diagnose-Overlay (temporär) — vereinheitlicht: EINE Helfer-Funktion für
// window.onerror UND window.onunhandledrejection (vorher 2× identischer Code).
function showErrorOverlay(title, html, stack) {
	const div = document.createElement("div");
	div.style.cssText = "position:fixed;inset:0;background:rgba(255,0,0,0.95);color:#fff;" +
		"z-index:999999;padding:20px;font-family:monospace;font-size:16px;overflow:auto;";
	div.innerHTML = "<h1>" + title + "</h1>" + html + "<pre>" + (stack || "") + "</pre>";
	document.documentElement.appendChild(div);
}
window.onerror = function (message, source, lineno, colno, error) {
	showErrorOverlay("Frontend Error Caught",
		"<p><strong>Message:</strong> " + message + "</p>" +
		"<p><strong>Source:</strong> " + source + "</p>" +
		"<p><strong>Line:</strong> " + lineno + " <strong>Col:</strong> " + colno + "</p>",
		error && error.stack);
	return false;
};
window.onunhandledrejection = function (event) {
	showErrorOverlay("Unhandled Promise Rejection",
		"<p><strong>Reason:</strong> " + event.reason + "</p>",
		event.reason && event.reason.stack);
};
</script>
<script>
// PWA-/Safari-Wiederherstellung: Transiente Bedienebenen gehören nie in einen
// frischen App-Start. Ohne Reset kann eine alte Navigator-/Overlay-Schicht sichtbar
// unsichtbar über der Oberfläche liegen und sämtliche Klicks abfangen.
function resetTransientUiLayers() {
	document.body.classList.remove("mnav-open");
	["overlay", "palette", "attachMenu", "modelMenu"].forEach((id) => {
		const el = document.getElementById(id);
		if (el) el.hidden = true;
	});
}
window.addEventListener("pageshow", resetTransientUiLayers);
</script>

<!-- 📱 Boot-Splash (18. Juli, spät v2): sofort sichtbares Start-Feedback statt dunklem
     Nichts am iPad. boot.js aktualisiert den Phasen-Text (#bootSplashMsg) und entfernt
     den Splash nach dem ersten Render; bei Start-Fehlern zeigt boot.js hier eine
     Meldung mit „Neu laden“-Knopf. Styles inline, damit sie ohne styles.css wirken. -->
<div id="bootSplash" style="position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:#111114;color:#ddd;font-family:system-ui,-apple-system,sans-serif">
	<div style="width:34px;height:34px;border-radius:50%;border:3px solid #444;border-top-color:#9a8cff;animation:bootspin 0.9s linear infinite"></div>
	<div id="bootSplashMsg">Impala67 startet…</div>
	<style>@keyframes bootspin{to{transform:rotate(360deg)}}</style>
</div>
<script>
	// Hängt der Start länger als 12 s (z.B. IndexedDB antwortet nicht): Ausweg anbieten.
	// Nach erfolgreichem Start ist #bootSplashMsg entfernt — dann passiert hier nichts.
	setTimeout(function () {
		var m = document.getElementById("bootSplashMsg");
		if (m) m.innerHTML = "Der Start dauert ungewöhnlich lange … <button onclick=\"location.reload()\" style=\"font:inherit;margin-left:8px;padding:6px 14px;border-radius:8px;border:1px solid #555;background:#2a2a2e;color:inherit\">🔄 Neu laden</button>";
	}, 12000);
</script>

<!-- config.local.js wird bewusst NICHT hier geladen: main.js importiert sie optional
     und fehlertolerant (try { await import("./config.local.js") } catch {}).
     FIX Start-Bug: Ein normales <script src="config.local.js"> wirft bei fehlender
     Datei "SyntaxError: Unexpected token '<'", weil tauri.localhost eine
     HTML-Fallback-Seite mit Status 200 liefert. drive.js liest window.APP_CONFIG
     lazy (erst beim Login) — die asynchrone Ladung ist unkritisch. -->
<link rel="icon" href="icon.svg" type="image/svg+xml">
<script type="module" src="main.js?build=49"></script>
<script>
// PWA: Service-Worker nur über http(s) registrieren — file:// unterstützt das nicht.
// Der Worker cached alle App-Dateien und aktualisiert sie im Hintergrund von selbst.
// FIX Start-Bug (Teil 2): In der Tauri-Desktop-App ist der Service-Worker sinnlos
// (Dateien liegen lokal, Updates macht der Tauri-Updater) und gefährlich — er hatte
// die HTML-Fallback-Antwort für die fehlende config.local.js dauerhaft gecacht,
// die App startete dann nur noch nach Strg+Shift+R. Darum: nur im Browser/PWA
// registrieren; in Tauri Alt-Registrierungen + Caches einmalig aufräumen.
if ("serviceWorker" in navigator && location.protocol.startsWith("http")) {
	if (window.__TAURI__) {
		navigator.serviceWorker.getRegistrations()
			.then((regs) => regs.forEach((r) => r.unregister()))
			.catch(() => {});
		if (window.caches && caches.keys) {
			caches.keys().then((keys) => keys.forEach((k) => caches.delete(k))).catch(() => {});
		}
	} else {
		// iPadOS hält Worker-Skripte mitunter länger im HTTP-Cache als die App-Dateien.
		// Der Build-Schlüssel erzwingt deshalb eine neue Worker-Prüfung, ohne dass der
		// gesamte Offline-Cache bei jedem Start gelöscht werden muss.
		navigator.serviceWorker.register("service-worker.js?build=49", { updateViaCache: "none" })
			.then((reg) => reg.update().catch(() => {}))
			.catch((e) => console.warn("Service-Worker:", e));
	}
}

</script>
